<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>New Tab</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="css/main.css" />
<link rel="stylesheet" href="css/grid.css" />
<link rel="stylesheet" href="css/components.css" />
</head>
<body>

  <main id="board">

    <!-- Search Bar -->
    <section id="search-wrap">
      <form id="search-form" autocomplete="off">
        <span id="search-icon">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </span>
        <input id="search-input" type="text" placeholder="Search the web…" />
      </form>
      <ul id="search-suggestions" class="hidden"></ul>
    </section>

    <!-- Category / Tab Ribbon -->
    <nav id="tab-ribbon"></nav>

    <!-- Speed Dial Grid -->
    <section id="grid-canvas" class="grid"></section>

    <!-- Modular Widget Dock -->
    <footer id="widget-dock">
      <div class="widget glass-card size-md" id="widget-weather">
        <div class="widget-head">
          <h3>Weather</h3>
          <button class="widget-menu-btn" data-widget="weather">⋯</button>
        </div>
        <div class="widget-body" id="weather-body" data-key="weather">Locating…</div>
        <div class="widget-dots" id="weather-dots"></div>
      </div>
      <div class="widget glass-card size-md" id="widget-clock">
        <div class="widget-head">
          <h3>Date &amp; Time</h3>
          <button class="widget-menu-btn" data-widget="clock">⋯</button>
        </div>
        <div class="widget-body" id="clock-body">
          <div id="clock-time">--:--:--</div>
          <div id="clock-date">--</div>
          <div id="clock-week">Week --</div>
        </div>
      </div>
      <div class="widget glass-card size-md" id="widget-todo">
        <div class="widget-head">
          <h3>To-Do</h3>
          <button class="widget-menu-btn" data-widget="todo">⋯</button>
        </div>
        <div class="widget-body">
          <input id="todo-input" type="text" placeholder="Add a task and press Enter…" />
          <ul id="todo-list"></ul>
        </div>
      </div>
    </footer>

    <div id="credit-watermark">
      Crafted by <strong>Dvvyom</strong> |
      <a href="https://github.com/omvs077" target="_blank" rel="noopener">GitHub</a> |
      <a href="mailto:omvs077@gmail.com">omvs077@gmail.com</a>
      — suggestions/feedback welcomed
    </div>

  </main>

  <!-- Custom Context Menu -->
  <div id="context-menu" class="glass-card hidden"></div>

  <!-- Add/Edit Link Modal -->
  <div id="modal-overlay" class="hidden"></div>
  <div id="link-modal" class="glass-card hidden">
    <h3 id="link-modal-title">Add Link</h3>
    <input id="link-title-input" type="text" placeholder="Title" />
    <input id="link-url-input" type="text" placeholder="https://example.com" />
    <div class="modal-actions">
      <button id="link-cancel-btn" type="button">Cancel</button>
      <button id="link-save-btn" type="button">Save</button>
    </div>
  </div>

  <!-- Category Modal -->
  <div id="cat-modal" class="glass-card hidden">
    <h3 id="cat-modal-title">Rename Collection</h3>
    <input id="cat-name-input" type="text" placeholder="Collection name" />
    <div class="modal-actions">
      <button id="cat-cancel-btn" type="button">Cancel</button>
      <button id="cat-save-btn" type="button">Save</button>
    </div>
  </div>

  <script src="js/bookmarks.js"></script>
  <script src="js/widgets.js"></script>
  <script src="js/UIController.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
